DWAPlannerROS:
  # Policy marker retained explicitly. DWA's operative non-holonomic limits are
  # max_vel_y=min_vel_y=0.0 and the adapter's forced y=0.0.
  holonomic_robot: false
  odom_topic: /odom
  max_vel_x: 0.10
  min_vel_x: -0.05
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_vel_trans: 0.10
  min_vel_trans: 0.01
  max_vel_theta: 0.28
  min_vel_theta: -0.28

  # Conservative SAMPLE values for low-speed initial tests.
  acc_lim_x: 0.20
  acc_lim_y: 0.0
  acc_lim_theta: 0.50
  acc_lim_trans: 0.20
  sim_time: 2.0
  sim_granularity: 0.025
  angular_sim_granularity: 0.025
  vx_samples: 10
  vy_samples: 1
  vth_samples: 20

  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 0.05
  forward_point_distance: 0.20
  stop_time_buffer: 0.50
  scaling_speed: 0.08
  max_scaling_factor: 0.20

  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.20
  latch_xy_goal_tolerance: true
  prune_plan: true
